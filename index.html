<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>おすすめ漫画アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .genre-btn { padding: 8px 16px; margin: 5px; border: 1px solid #0096cc; background-color: white; color: #0096cc; border-radius: 20px; cursor: pointer; }
        .genre-btn.active { background-color: #0096cc; color: white; }
        .manga-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .manga-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 200px; }
        .manga-card img { max-width: 100%; height: auto; border-radius: 5px; }
        h3 { font-size: 16px; margin: 10px 0; }
        p { font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <h1>📚 おすすめ漫画アプリ</h1>

    <div style="margin-bottom: 20px;">
        <input type="text" id="search-input" placeholder="漫画のタイトルで検索..." style="padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc;">
        <button onclick="fetchMangas()" style="padding: 10px 15px; border: none; background-color: #0096cc; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">検索</button>
    </div>

    <div id="genre-container"></div>

    <div id="manga-container" class="manga-grid"></div>

    <script>
        let selectedGenres = [];

        // ジャンルを取得して表示
        async function fetchGenres() {
            const response = await fetch('/genres');
            const data = await response.json();
            const container = document.getElementById('genre-container');
            container.innerHTML = '';
            
            data.genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'genre-btn';
                btn.innerText = genre.name;
                btn.onclick = () => toggleGenre(genre.id, btn);
                container.appendChild(btn);
            });
        }

        // ジャンルボタンのクリック処理
        function toggleGenre(id, btn) {
            const index = selectedGenres.indexOf(id);
            if (index > -1) {
                selectedGenres.splice(index, 1);
                btn.classList.remove('active');
            } else {
                selectedGenres.push(id);
                btn.classList.add('active');
            }
            fetchMangas();
        }

        // 漫画を取得して表示（検索対応）
        async function fetchMangas() {
            let url = '/mangas?';
            
            if (selectedGenres.length > 0) {
                url += `genre_ids=${selectedGenres.join(',')}&`;
            }
            
            const keyword = document.getElementById('search-input').value;
            if (keyword) {
                url += `keyword=${encodeURIComponent(keyword)}`;
            }

            const response = await fetch(url);
            const data = await response.json();
            displayMangas(data.mangas);
        }

        // 漫画を画面に描画
        function displayMangas(mangas) {
            const container = document.getElementById('manga-container');
            container.innerHTML = '';
            
            if (mangas.length === 0) {
                container.innerHTML = '<p>該当する漫画が見つかりません。</p>';
                return;
            }

            mangas.forEach(manga => {
                const card = document.createElement('div');
                card.className = 'manga-card';
                card.innerHTML = `
                    <img src="${manga.image_url}" alt="${manga.title}">
                    <h3>${manga.title}</h3>
                    <p>作者: ${manga.author}</p>
                    <p>${manga.description}</p>
                `;
                container.appendChild(card);
            });
        }

        // ページ読み込み時に実行
        window.onload = () => {
            fetchGenres();
            fetchMangas();
        };
    </script>
</body>
</html>
